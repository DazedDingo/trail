name: trail
description: "Trail — personal-safety GPS logger. Offline, encrypted, 4h-cadence background pings."
publish_to: 'none'
version: 0.8.1+50

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State / routing — match watchnext + groceries-app conventions
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Location + scheduling
  geolocator: ^13.0.1
  # Reverse geocoding — uses Android's built-in Geocoder for an approx
  # place name ("Cambridge, MA") alongside raw lat/lon on history screens.
  # Offline-capable where the device has cached geocoder data; returns
  # empty results (not errors) on no-network gaps.
  geocoding: ^3.0.0
  # Pinned to ^0.9.0+3 — earlier 0.5.x referenced Flutter v1 embedding
  # (ShimPluginRegistry) which is gone in Flutter 3.41+ and broke CI.
  workmanager: ^0.9.0+3

  # Storage (encrypted)
  sqflite_sqlcipher: ^3.1.0+1
  flutter_secure_storage: ^9.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  # PBKDF2 for the "set a backup passphrase" flow — derives the SQLCipher
  # key from a user-chosen passphrase + device-persisted salt so the
  # encrypted DB can be restored from Android auto-backup onto a fresh
  # install. OWASP 2023 guidance: SHA-256, ≥ 210,000 iterations.
  pointycastle: ^3.9.1

  # Device sensors / status
  battery_plus: ^6.0.3
  connectivity_plus: ^6.0.5

  # Auth / permissions
  local_auth: ^2.3.0
  permission_handler: ^11.3.1

  # UX helpers
  share_plus: ^10.0.2
  # Panic-receipt notification + continuous-panic persistent notification.
  # Silent for scheduled pings (PLAN.md: too frequent to notify); only the
  # panic path posts user-visible notifications.
  flutter_local_notifications: ^17.2.3
  # Composes the "PANIC at HH:MM — maps.google.com/?q=lat,lon" SMS intent
  # URL for Phase 2's emergency-contact hand-off. No SEND_SMS permission —
  # user still taps send in their default SMS app.
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^9.0.1

  # Offline-map region picker — `file_picker` lets the user install a
  # region by selecting a `.pmtiles` from storage; we copy it into the
  # app's documents dir so it survives uninstall-restore flows and SAF
  # permission expiry.
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5

  # Vector-tile renderer for the offline map viewer. Reads sideloaded
  # `.mbtiles` / `.pmtiles` produced by `planetiler` from the
  # OpenMapTiles schema. The newer `maplibre` package's local-file
  # support on Android was confirmed broken in 0.8.0+37 (see
  # CHANGELOG); `maplibre_gl` is the older mapbox_gl-derived community
  # plugin with a documented PMTiles example and known-working local
  # MBTiles support. Different API: imperative
  # `MapLibreMapController.addLine/addCircle/addLayer` rather than
  # declarative `layers:`.
  maplibre_gl: ^0.26.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Drop-in sqflite backend for unit tests so DAO queries can be exercised
  # against a real (in-memory) SQLite without SQLCipher's platform channel.
  # Production still uses sqflite_sqlcipher for the encrypted on-device DB.
  sqflite_common_ffi: ^2.3.3
  # Transitive test deps we reference explicitly so `flutter analyze`
  # stays quiet about `depend_on_referenced_packages`:
  # - sqlite3: `ping_dao_test.dart` registers an `open.overrideFor`
  #   callback to load the versioned `libsqlite3.so.0` inside the ffi
  #   isolate (arm64 dev boxes and CI workers lack the unversioned
  #   symlink that ships in libsqlite3-dev).
  # - path_provider_platform_interface + plugin_platform_interface:
  #   `mbtiles_service_test.dart` installs a fake platform provider so
  #   `getApplicationDocumentsDirectory()` points at a tempdir.
  sqlite3: ^2.4.3
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  # Bundled OSM Liberty style (~1.2 MB) — style.json with asset:// URLs,
  # OSM Liberty sprites, Roboto glyph PBFs (0-255 / 256-511 / 1024-1279
  # ranges, enough for English + extended Latin labels in the UK). The
  # `openmaptiles` source URL inside style.json is a placeholder rewritten
  # at runtime to point at the active region's `.pmtiles` file under
  # `<docs>/tiles/`. See docs/TILES.md.
  assets:
    - assets/maptiles/style.json
    - assets/maptiles/sprites/
    - assets/maptiles/glyphs/Roboto Regular/
    - assets/maptiles/glyphs/Roboto Medium/
    - assets/maptiles/glyphs/Roboto Condensed Italic/
